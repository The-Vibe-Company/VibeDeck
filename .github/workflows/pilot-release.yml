name: release-signed

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag SemVer existant associé à une release brouillon
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: signed-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: release
        name: Validate immutable release identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          git fetch --force origin main "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          sha="$(git rev-list -n 1 "$RELEASE_TAG")"
          git merge-base --is-ancestor "$sha" origin/main
          version="$(git show "$sha:package.json" | node -e "let source=''; process.stdin.on('data', chunk => source += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(source).version));")"
          test "$RELEASE_TAG" = "v$version"
          release_is_draft=""
          for _ in 1 2 3 4 5 6; do
            release_is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
            if [ -n "$release_is_draft" ]; then
              break
            fi
            sleep 5
          done
          test "$release_is_draft" = true
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  macos:
    needs: validate
    runs-on: macos-latest
    environment: signed-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:pilot-ui
      - run: npm run verify:release
      - run: npm audit --omit=dev
      - run: npm audit
      - name: Prepare Apple notarization API key
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID_VALUE: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "$APPLE_API_KEY_CONTENT"
          test -n "$APPLE_API_KEY_ID_VALUE"
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID_VALUE}.p8"
          if [[ "$APPLE_API_KEY_CONTENT" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          else
            printf '%s' "$APPLE_API_KEY_CONTENT" | /usr/bin/base64 -D > "$key_path"
          fi
          grep -q "BEGIN PRIVATE KEY" "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
      - name: Build, sign, notarize and upload macOS assets
        run: npm run build && npx electron-builder --mac --universal -c.forceCodeSigning=true -c.mac.notarize=true --publish always
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_RELEASE_TOKEN: ${{ github.token }}
      - run: npm run verify:packaged-fuses
      - name: Verify the distributed DMG application
        shell: bash
        run: |
          set -euo pipefail
          dmg_path="$(find release -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          test -n "$(find release -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -f release/latest-mac.yml
          mount_path="$RUNNER_TEMP/vibedeck-release-volume"
          mkdir -p "$mount_path"
          cleanup() { hdiutil detach "$mount_path" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          hdiutil verify "$dmg_path"
          hdiutil attach -nobrowse -readonly -mountpoint "$mount_path" "$dmg_path" >/dev/null
          app_path="$mount_path/VibeDeck.app"
          test -d "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          npm run verify:packaged-fuses -- "$app_path"
          npm run test:packaged -- "$app_path"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error

  windows:
    if: vars.ENABLE_WINDOWS_RELEASE == 'true'
    needs: validate
    runs-on: windows-latest
    environment: signed-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:pilot-ui
      - run: npm run verify:release
      - run: npm audit --omit=dev
      - run: npm audit
      - name: Build, sign and upload Windows assets
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_CODE_SIGNING_ENDPOINT: ${{ vars.AZURE_CODE_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
          WIN_PUBLISHER_NAME: ${{ vars.WIN_PUBLISHER_NAME }}
          GITHUB_RELEASE_TOKEN: ${{ github.token }}
        run: |
          npm run dist:win:signed -- --publish always
      - run: npm run verify:packaged-fuses
      - run: npm run test:packaged
      - name: Verify Windows Authenticode signature and update metadata
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw "Installateur Windows introuvable" }
          if (-not (Test-Path release/latest.yml)) { throw "latest.yml introuvable" }
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($signature.Status -ne "Valid") {
            throw "Signature Authenticode invalide: $($signature.Status)"
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

  publish:
    needs: [validate, macos, windows]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.macos.result == 'success' &&
      (needs.windows.result == 'success' || needs.windows.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.sha }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Validate assets and publish the draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          WINDOWS_RELEASE_ENABLED: ${{ vars.ENABLE_WINDOWS_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          test "$(find release -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d ' ')" = 1
          test "$(find release -maxdepth 1 -type f -name '*.zip' | wc -l | tr -d ' ')" = 1
          test -f release/latest-mac.yml
          if [ "$WINDOWS_RELEASE_ENABLED" = true ]; then
            test "$(find release -maxdepth 1 -type f -name '*.exe' | wc -l | tr -d ' ')" = 1
            test -f release/latest.yml
            test "$(find release -maxdepth 1 -type f -name '*.blockmap' | wc -l | tr -d ' ')" = 3
          else
            test "$(find release -maxdepth 1 -type f -name '*.exe' | wc -l | tr -d ' ')" = 0
            test ! -e release/latest.yml
            test "$(find release -maxdepth 1 -type f -name '*.blockmap' | wc -l | tr -d ' ')" = 2
          fi
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" = true
          npm run checksums:release
          npm run verify:checksums
          gh release upload "$RELEASE_TAG" release/SHA256SUMS.txt --clobber
          expected_assets="$(find release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.blockmap' -o -name 'latest.yml' -o -name 'latest-mac.yml' -o -name 'SHA256SUMS.txt' \) -exec basename {} \; | sort)"
          remote_assets="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort)"
          test "$remote_assets" = "$expected_assets"
          gh release edit "$RELEASE_TAG" --draft=false --latest
